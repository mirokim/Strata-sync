<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Strata layers — slightly angled horizontal bands -->
  <g clip-path="url(#roundedClip)" opacity="0.15">
    <rect x="-20" y="130" width="552" height="58" rx="4" fill="#38bdf8" transform="rotate(-3, 256, 159)"/>
    <rect x="-20" y="205" width="552" height="58" rx="4" fill="#22d3ee" transform="rotate(-3, 256, 234)"/>
    <rect x="-20" y="280" width="552" height="58" rx="4" fill="#34d399" transform="rotate(-3, 256, 309)"/>
    <rect x="-20" y="355" width="552" height="58" rx="4" fill="#60a5fa" transform="rotate(-3, 256, 384)"/>
  </g>

  <!-- Main strata bars (centered, slightly angled) -->
  <g filter="url(#glow)">
    <!-- Layer 1 (top) -->
    <rect x="80" y="148" width="352" height="44" rx="8" fill="url(#layer1)" transform="rotate(-2.5, 256, 170)" opacity="0.95"/>
    <!-- Layer 2 -->
    <rect x="80" y="212" width="352" height="44" rx="8" fill="url(#layer2)" transform="rotate(-2.5, 256, 234)" opacity="0.90"/>
    <!-- Layer 3 -->
    <rect x="80" y="276" width="352" height="44" rx="8" fill="url(#layer3)" transform="rotate(-2.5, 256, 298)" opacity="0.85"/>
    <!-- Layer 4 (bottom) -->
    <rect x="80" y="340" width="352" height="44" rx="8" fill="url(#layer4)" transform="rotate(-2.5, 256, 362)" opacity="0.80"/>
  </g>

  <!-- Subtle shine on top -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" opacity="0" />

  <!-- Border highlight -->
  <rect x="2" y="2" width="508" height="508" rx="110" ry="110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
</svg>
